spring:
  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 0

app:
  jwt:
    access-secret: test-access-secret-must-be-at-least-32-bytes-long-for-hs256
    refresh-secret: test-refresh-secret-must-also-be-at-least-32-bytes-long-now
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    issuer: user-service-test
  email:
    from: test@example.com
    sendgrid-api-key: ""
  activation:
    base-url: http://localhost
    token-ttl-hours: 24
    resend-cooldown-seconds: 60
    resend-daily-limit: 5
  otp:
    ttl-minutes: 5
    max-attempts: 3
    code-length: 6
  login:
    fail-lock-threshold: 5
    fail-lock-window-minutes: 15

logging:
  level:
    com.example.userservice: DEBUG
